<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Icy Heights · Vertical endless jumper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0f1e;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      touch-action: manipulation;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #1a1f2f;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      /* Removed crisp-edges for smooth high-res rendering */
    }
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
    }
    .ui-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      color: white;
      text-shadow: 0 2px 6px black;
      font-weight: bold;
      pointer-events: none;
      padding-top: env(safe-area-inset-top, 10px);
    }
    .score-panel {
      background: rgba(10, 20, 35, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      padding: 12px 28px;
      font-size: 1.5rem;
      letter-spacing: 1px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 15px rgba(91, 155, 213, 0.3);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ffffff;
      transition: all 0.3s ease;
    }

    .combo-badge {
      color: #ffd966;
      font-size: 1.2rem;
      margin-left: 10px;
      text-shadow: 0 0 10px #ffd966;
    }
    .mute-btn {
      pointer-events: auto;
      background: rgba(0,0,0,0.7);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 1.8rem;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: 0.2s;
      margin-top: env(safe-area-inset-top, 10px);
    }
    .mute-btn:active { 
      background: #3a4a6a;
      transform: scale(0.9);
    }

    .home-btn {
      pointer-events: auto;
      background: rgba(0,0,0,0.7);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 1.8rem;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: 0.2s;
      margin-top: env(safe-area-inset-top, 10px);
    }
    .home-btn:active { 
      background: #3a4a6a;
      transform: scale(0.9);
    }
    
    .mobile-controls {
      pointer-events: auto;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }
    
    .movement-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }
    
    .horizontal-controls {
     padding-left: 50px;
     padding-bottom: 40px;
      display: flex;
      gap: 50px; /* مسافة كبيرة جداً بناءً على طلب المستخدم */
      align-items: center;
    }



    
    .ctrl-btn {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(15px);
      border: 2px solid rgba(255,255,255,0.5);
      color: white;
      font-size: 2rem;
      font-weight: bold;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 6px 12px rgba(0,0,0,0.5);
      transition: all 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }
    
    .ctrl-btn:active {
      background: rgba(255,255,255,0.5);
      transform: scale(0.85);
      border-color: #ffd966;
      box-shadow: 0 3px 8px rgba(0,0,0,0.3);
    }
    
    .btn-up {
      background: rgba(100, 200, 255, 0.3);
      border-color: rgba(100, 200, 255, 0.6);
    }
    
    .btn-down {
      background: rgba(255, 150, 100, 0.3);
      border-color: rgba(255, 150, 100, 0.6);
    }
    
    .btn-left {
      background: rgba(150, 200, 255, 0.3);
      border-color: rgba(150, 200, 255, 0.6);
    }
    
    .btn-right {
      background: rgba(150, 200, 255, 0.3);
      border-color: rgba(150, 200, 255, 0.6);
    }
    
    .jump-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }
    
    .jump-btn {
      background: rgba(252, 170, 60, 0.9);
      border-color: #ffd966;
      font-size: 2.5rem;
      width: 75px;
      height: 75px;
      box-shadow: 0 8px 25px rgba(252, 170, 60, 0.5);
      animation: pulse 2s infinite;
    }
    
    .jump-btn:active {
      background: #ffd966;
      box-shadow: 0 4px 15px rgba(252, 170, 60, 0.8);
      animation: none;
    }
    
    @keyframes pulse {
      0% { box-shadow: 0 8px 25px rgba(252, 170, 60, 0.5); }
      50% { box-shadow: 0 8px 35px rgba(252, 170, 60, 0.8); }
      100% { box-shadow: 0 8px 25px rgba(252, 170, 60, 0.5); }
    }
    
    .jump-secondary {
      background: rgba(255, 200, 100, 0.7);
      border-color: #ffcc66;
      font-size: 1.5rem;
      width: 50px;
      height: 50px;
    }
    
    @media (min-width: 768px) {
      .mobile-controls {
        display: none;
      }
      .score-panel {
        font-size: 1.6rem;
        padding: 15px 30px;
      }
    }
    
    @media (max-width: 600px) {
      .ctrl-btn {
        width: 48px;
        height: 48px;
        font-size: 1.4rem;
        backdrop-filter: none;
        background: rgba(255, 255, 255, 0.4);
      }
      .score-panel {
        backdrop-filter: none;
        background: rgba(10, 20, 35, 0.9);
      }
      .jump-btn {
        width: 60px;
        height: 60px;
        font-size: 1.8rem;
      }
      .jump-secondary {
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
      }
      .horizontal-controls {
        gap: 8px;
      }
    }
    .start-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      z-index: 50;
    }
    .start-btn {
      pointer-events: auto;
      background: linear-gradient(180deg, #5b9bd5, #1a3a5c);
      border: 3px solid #c8e0ff;
      color: white;
      font-size: 2.2rem;
      padding: 15px 40px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      font-weight: bold;
      margin-top: 180px; /* Offset to not cover title */
      animation: pulseBtn 2s infinite, floatBtn 3s infinite ease-in-out;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-family: 'Segoe UI', 'Arial', sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    @keyframes floatBtn {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .start-btn:active {
      transform: scale(0.95);
    }
    @keyframes pulseBtn {
      0% { box-shadow: 0 0 0 0 rgba(91, 155, 213, 0.7); }
      70% { box-shadow: 0 0 0 20px rgba(91, 155, 213, 0); }
      100% { box-shadow: 0 0 0 0 rgba(91, 155, 213, 0); }
    }
    .hidden {
      display: none !important;
    }
    
    /* Game Selection Hub Styles */
    #hub-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #1a2a4a 0%, #0a0f1e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 40px;
      overflow-y: auto;
    }
    .hub-title {
      color: #ffffff;
      font-size: 3.5rem;
      font-weight: 900;
      margin-bottom: 50px;
      text-shadow: 0 0 20px rgba(91, 155, 213, 0.6);
      text-align: center;
      letter-spacing: 4px;
      font-family: 'Segoe UI', sans-serif;
    }
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      width: 100%;
      max-width: 1000px;
    }
    .game-card {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }
    .game-card::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: conic-gradient(transparent, rgba(91, 155, 213, 0.3), transparent 30%);
      animation: rotateBorder 4s linear infinite;
      z-index: -1;
    }
    @keyframes rotateBorder {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .game-card:hover {
      transform: translateY(-15px) scale(1.05);
      border-color: #5b9bd5;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(91, 155, 213, 0.4);
    }
    .game-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
    }
    .game-name {
      color: white;
      font-size: 1.8rem;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .game-desc {
      color: #a0b0c0;
      font-size: 1rem;
      line-height: 1.4;
    }
    .coming-soon {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .coming-soon:hover { transform: none; box-shadow: none; border-color: rgba(255,255,255,0.1); }
  </style>

</head>
<body>
<div id="game-wrapper">
  <!-- Selection Hub -->
  <div id="hub-layer">
    <h1 class="hub-title">M-STORE GAMES</h1>
    <div class="game-grid">
      <div class="game-card" id="btnLaunchOmda">
        <div class="game-icon">❄️</div>
        <div class="game-name">AL-OMDA MAN</div>
        <div class="game-desc">تسلق البرج الجليدي وحطم الأرقام القياسية في لعبة مليئة بالمغامرة!</div>
      </div>
      <div class="game-card coming-soon">
        <div class="game-icon">🚗</div>
        <div class="game-name">قريباً...</div>
        <div class="game-desc">لعبة سباق سيارات مثيرة قادمة في التحديث القادم.</div>
      </div>
    </div>
  </div>

  <!-- Game Container (Hidden initially) -->
  <div id="game-container" class="hidden">
    <canvas id="gameCanvas" aria-label="Icy Heights game canvas"></canvas>
    <div id="ui-layer">

    <div id="startOverlay" class="start-overlay">
      <button id="startBtn" class="start-btn">بدء اللعب</button>
    </div>
    <div class="ui-top">
      <div class="score-panel">
        <span id="heightDisplay">0 م</span>
        <span id="comboDisplay" class="combo-badge"></span>
      </div>
      <div style="display: flex; gap: 10px; pointer-events: auto;">
        <button class="mute-btn" id="muteToggle" aria-label="Toggle sound">🔊</button>
        <button class="home-btn" id="homeBtn" aria-label="Back to home">🏠</button>
      </div>
    </div>
    
    <div class="mobile-controls" id="mobileControls">
      <div class="movement-controls">
        <div class="horizontal-controls">
          <button class="ctrl-btn btn-left" id="btnLeft" title="التحرك يساراً">◀</button>
          <button class="ctrl-btn btn-right" id="btnRight" title="التحرك يميناً">▶</button>
        </div>
      </div>

      
      <div class="jump-area">
        <button class="ctrl-btn jump-btn" id="btnJump" title="قفزة عالية">▲</button>
        <button class="ctrl-btn jump-secondary" id="btnJumpSmall" title="قفزة صغيرة">⬆</button>
      </div>
    </div>
  </div>
</div>


<script>
  (function() {
    // ──────────────────────────────────── GAME SETUP ────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // UI elements
    const heightDisplay = document.getElementById('heightDisplay');
    const comboDisplay = document.getElementById('comboDisplay');
    const muteBtn = document.getElementById('muteToggle');
    const homeBtn = document.getElementById('homeBtn');
    const startOverlay = document.getElementById('startOverlay');
    const startBtn = document.getElementById('startBtn');
    const hubLayer = document.getElementById('hub-layer');
    const gameContainer = document.getElementById('game-container');
    const btnLaunchOmda = document.getElementById('btnLaunchOmda');
    
    homeBtn.addEventListener('click', () => {
      sfxClick();
      hubLayer.classList.remove('hidden');
      gameContainer.classList.add('hidden');
      gameState = STATE.MENU;
    });
    
    btnLaunchOmda.addEventListener('click', () => {
      sfxClick();
      hubLayer.classList.add('hidden');
      gameContainer.classList.remove('hidden');
      // بدء في القائمة الرئيسية للعبة
      gameState = STATE.MENU;
    });

    startBtn.addEventListener('click', () => {

      initAudio();
      if (gameState === STATE.MENU) {
        startGame();
      } else if (gameState === STATE.GAMEOVER) {
        restartGame();
      }
    });

    // Dynamic dimensions
    let W, H;
    const ZOOM_LEVEL = 1.8; // تكبير أكثر
    let DPR = window.devicePixelRatio || 1;
    let currentZoom = 1.8;

    function resizeCanvas() {
      const isMobile = window.innerWidth <= 600;
      DPR = isMobile ? Math.min(window.devicePixelRatio || 1, 1.5) : Math.min(window.devicePixelRatio || 1, 2);
      currentZoom = isMobile ? 1.45 : ZOOM_LEVEL; // تصغير الزوم في الموبايل
      
      W = window.innerWidth / currentZoom;
      H = window.innerHeight / currentZoom;
      canvas.width = window.innerWidth * DPR;
      canvas.height = window.innerHeight * DPR;
    }
    
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => {
      setTimeout(resizeCanvas, 100);
    });
    resizeCanvas();

    // ═══════════════════════════════════════════════════════════════
    // 🎨 نظام تحميل الصور - ضع مسارات صورك هنا
    // ═══════════════════════════════════════════════════════════════
    const IMAGE_PATHS = {
      idle: '1.png',        // صورة الوقوف
      jump: '2.png',        // صورة القفز
      walk1: '3.png',      // صورة الخطوة الأولى
      walk2: '4.png',      // صورة الخطوة الثانية
      fall: '2.png'         // صورة السقوط (اختياري)
    };

    // كائن لتخزين الصور المحملة
    const playerImages = {
      idle: null,
      jump: null,
      walk1: null,
      walk2: null,
      fall: null
    };
    
    let imagesLoaded = false;
    let imagesLoadAttempted = false;
    let currentWalkFrame = 1;
    let walkFrameTimer = 0;
    const WALK_FRAME_DURATION = 0.15;

    // ──────────────────────────────────── تحميل الصور ──────────────────────────────────
    function loadPlayerImages() {
      if (imagesLoadAttempted) return;
      imagesLoadAttempted = true;
      
      let loadedCount = 0;
      const totalImages = Object.keys(IMAGE_PATHS).length;
      
      // تحميل كل صورة
      for (const [key, path] of Object.entries(IMAGE_PATHS)) {
        const img = new Image();
        img.onload = () => {
          loadedCount++;
          console.log(`✅ تم تحميل: ${key} (${path})`);
          if (loadedCount === totalImages) {
            imagesLoaded = true;
            console.log('🎉 جميع الصور تم تحميلها بنجاح!');
          }
        };
        img.onerror = () => {
          console.warn(`⚠️ فشل تحميل: ${key} (${path}) - سيتم استخدام الصورة الافتراضية`);
          loadedCount++;
          if (loadedCount === totalImages) {
            // إذا فشلت كل الصور، استخدم الصور البرمجية
            if (!imagesLoaded) {
              console.log('🔄 جاري استخدام الصور البرمجية الافتراضية...');
              createFallbackSprites();
              imagesLoaded = true;
            }
          }
        };
        img.src = path;
        playerImages[key] = img;
      }
      
      // احتياط: إذا لم تكتمل التحميل خلال 3 ثواني، استخدم الصور الافتراضية
      setTimeout(() => {
        if (!imagesLoaded) {
          console.warn('⏰ انتهى وقت التحميل - جاري استخدام الصور الافتراضية');
          createFallbackSprites();
          imagesLoaded = true;
        }
      }, 3000);
    }

    // ═══════════════════════════════════════════════════════════════
    // 🎨 إنشاء الصور البرمجية الاحتياطية (في حال عدم وجود صور)
    // ═══════════════════════════════════════════════════════════════
    function createFallbackSprites() {
      playerImages.idle = createIdleSprite();
      playerImages.jump = createJumpSprite();
      playerImages.walk1 = createWalkSprite(1);
      playerImages.walk2 = createWalkSprite(2);
      playerImages.fall = createJumpSprite(); // استخدام صورة القفز للسقوط
    }

    function createIdleSprite() {
      const sprite = document.createElement('canvas');
      sprite.width = 256;
      sprite.height = 256;
      const sctx = sprite.getContext('2d');
      sctx.scale(4, 4);
      
      sctx.fillStyle = '#e8f4ff';
      sctx.shadowColor = '#5b9bd5';
      sctx.shadowBlur = 8;
      sctx.beginPath();
      sctx.ellipse(32, 28, 14, 20, 0, 0, Math.PI*2);
      sctx.fill();
      
      sctx.fillStyle = '#1a3a5c';
      sctx.shadowBlur = 0;
      sctx.beginPath();
      sctx.arc(26, 22, 4, 0, Math.PI*2);
      sctx.fill();
      sctx.beginPath();
      sctx.arc(38, 22, 4, 0, Math.PI*2);
      sctx.fill();
      
      sctx.fillStyle = 'white';
      sctx.beginPath();
      sctx.arc(27, 21, 1.5, 0, Math.PI*2);
      sctx.fill();
      sctx.beginPath();
      sctx.arc(39, 21, 1.5, 0, Math.PI*2);
      sctx.fill();
      
      sctx.strokeStyle = '#1a3a5c';
      sctx.lineWidth = 2;
      sctx.beginPath();
      sctx.arc(32, 28, 6, 0.1, Math.PI - 0.1);
      sctx.stroke();
      
      sctx.fillStyle = '#ff6b4a';
      sctx.beginPath();
      sctx.ellipse(32, 10, 16, 8, 0, Math.PI, 0);
      sctx.fill();
      sctx.fillStyle = 'white';
      sctx.beginPath();
      sctx.arc(32, 5, 4, 0, Math.PI*2);
      sctx.fill();
      
      sctx.strokeStyle = '#ff6b4a';
      sctx.lineWidth = 3;
      sctx.beginPath();
      sctx.moveTo(20, 30);
      sctx.quadraticCurveTo(15, 35, 12, 42);
      sctx.stroke();
      
      sctx.fillStyle = '#d0e8ff';
      sctx.fillRect(26, 44, 5, 12);
      sctx.fillRect(33, 44, 5, 12);
      
      return sprite;
    }

    function createJumpSprite() {
      const sprite = document.createElement('canvas');
      sprite.width = 256;
      sprite.height = 256;
      const sctx = sprite.getContext('2d');
      sctx.scale(4, 4);
      
      sctx.fillStyle = '#e8f4ff';
      sctx.shadowColor = '#5b9bd5';
      sctx.shadowBlur = 10;
      sctx.beginPath();
      sctx.ellipse(32, 24, 14, 18, 0, 0, Math.PI*2);
      sctx.fill();
      
      sctx.fillStyle = '#1a3a5c';
      sctx.shadowBlur = 0;
      sctx.beginPath();
      sctx.arc(26, 18, 5, 0, Math.PI*2);
      sctx.fill();
      sctx.beginPath();
      sctx.arc(38, 18, 5, 0, Math.PI*2);
      sctx.fill();
      
      sctx.fillStyle = 'white';
      sctx.beginPath();
      sctx.arc(27, 17, 2, 0, Math.PI*2);
      sctx.fill();
      sctx.beginPath();
      sctx.arc(39, 17, 2, 0, Math.PI*2);
      sctx.fill();
      
      sctx.fillStyle = '#1a3a5c';
      sctx.beginPath();
      sctx.ellipse(32, 28, 5, 4, 0, 0, Math.PI*2);
      sctx.fill();
      
      sctx.fillStyle = '#ff6b4a';
      sctx.beginPath();
      sctx.ellipse(32, 8, 16, 7, 0, Math.PI, 0);
      sctx.fill();
      sctx.fillStyle = 'white';
      sctx.beginPath();
      sctx.arc(32, 3, 4, 0, Math.PI*2);
      sctx.fill();
      
      sctx.strokeStyle = '#ff6b4a';
      sctx.lineWidth = 3;
      sctx.beginPath();
      sctx.moveTo(20, 26);
      sctx.quadraticCurveTo(10, 20, 8, 10);
      sctx.stroke();
      
      sctx.fillStyle = '#d0e8ff';
      sctx.fillRect(28, 40, 8, 8);
      
      return sprite;
    }

    function createWalkSprite(frame) {
      const sprite = document.createElement('canvas');
      sprite.width = 256;
      sprite.height = 256;
      const sctx = sprite.getContext('2d');
      sctx.scale(4, 4);
      
      sctx.fillStyle = '#e8f4ff';
      sctx.shadowColor = '#5b9bd5';
      sctx.shadowBlur = 8;
      sctx.beginPath();
      sctx.ellipse(32, 28, 14, 20, 0, 0, Math.PI*2);
      sctx.fill();
      
      sctx.fillStyle = '#1a3a5c';
      sctx.shadowBlur = 0;
      sctx.beginPath();
      sctx.arc(26, 22, 4, 0, Math.PI*2);
      sctx.fill();
      sctx.beginPath();
      sctx.arc(38, 22, 4, 0, Math.PI*2);
      sctx.fill();
      
      const lookX = frame === 1 ? 27 : 37;
      sctx.fillStyle = 'white';
      sctx.beginPath();
      sctx.arc(lookX, 21, 1.5, 0, Math.PI*2);
      sctx.fill();
      sctx.beginPath();
      sctx.arc(lookX + 12, 21, 1.5, 0, Math.PI*2);
      sctx.fill();
      
      sctx.fillStyle = '#ff6b4a';
      sctx.beginPath();
      sctx.ellipse(32, 10, 16, 8, 0, Math.PI, 0);
      sctx.fill();
      sctx.fillStyle = 'white';
      sctx.beginPath();
      sctx.arc(32, 5, 4, 0, Math.PI*2);
      sctx.fill();
      
      sctx.strokeStyle = '#ff6b4a';
      sctx.lineWidth = 3;
      sctx.beginPath();
      sctx.moveTo(20, 30);
      if (frame === 1) {
        sctx.quadraticCurveTo(14, 33, 10, 40);
      } else {
        sctx.quadraticCurveTo(14, 37, 10, 44);
      }
      sctx.stroke();
      
      sctx.fillStyle = '#d0e8ff';
      if (frame === 1) {
        sctx.fillRect(24, 44, 5, 10);
        sctx.fillRect(35, 44, 5, 8);
        sctx.fillRect(18, 30, 4, 10);
      } else {
        sctx.fillRect(24, 44, 5, 8);
        sctx.fillRect(35, 44, 5, 10);
        sctx.fillRect(42, 30, 4, 10);
      }
      
      return sprite;
    }

    // بدء تحميل الصور
    loadPlayerImages();

    // ═══════════════════════════════════════════════════════════════
    // 🔊 نظام الصوت
    // ═══════════════════════════════════════════════════════════════
    let audioCtx = null;
    let muted = false;

    function initAudio() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch (e) {
        console.warn('Web Audio not supported');
      }
    }

    function playSound(freq, type = 'square', duration = 0.12, vol = 0.15) {
      if (muted || !audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(vol, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration);
    }

    function sfxJump() { playSound(480, 'square', 0.1, 0.12); playSound(620, 'square', 0.08, 0.08); }
    function sfxLand() { playSound(160, 'triangle', 0.15, 0.14); }
    function sfxCombo() { playSound(780, 'square', 0.07, 0.1); playSound(950, 'square', 0.06, 0.07); }
    function sfxGameOver() { playSound(90, 'sawtooth', 0.3, 0.25); }
    function sfxClick() { playSound(700, 'square', 0.05, 0.05); }

    muteBtn.addEventListener('click', () => {
      initAudio();
      muted = !muted;
      muteBtn.textContent = muted ? '🔇' : '🔊';
      sfxClick();
    });

    // ═══════════════════════════════════════════════════════════════
    // 🎮 نظام الإدخال
    // ═══════════════════════════════════════════════════════════════
    const keys = {
      left: false,
      right: false,
      up: false,
      down: false,
      jump: false,
      jumpSmall: false,
      pause: false
    };

    window.addEventListener('keydown', (e) => {
      initAudio();
      const key = e.key;
      if (key === 'ArrowLeft' || key === 'Left' || key === 'a' || key === 'A') {
        keys.left = true;
        e.preventDefault();
      } else if (key === 'ArrowRight' || key === 'Right' || key === 'd' || key === 'D') {
        keys.right = true;
        e.preventDefault();
      } else if (key === 'ArrowUp' || key === 'Up' || key === 'w' || key === 'W') {
        keys.up = true;
        e.preventDefault();
      } else if (key === 'ArrowDown' || key === 'Down' || key === 's' || key === 'S') {
        keys.down = true;
        e.preventDefault();
      } else if (key === ' ') {
        keys.jump = true;
        e.preventDefault();
      } else if (key === 'p' || key === 'P' || key === 'Escape') {
        keys.pause = true;
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', (e) => {
      const key = e.key;
      if (key === 'ArrowLeft' || key === 'Left' || key === 'a' || key === 'A') {
        keys.left = false;
        e.preventDefault();
      } else if (key === 'ArrowRight' || key === 'Right' || key === 'd' || key === 'D') {
        keys.right = false;
        e.preventDefault();
      } else if (key === 'ArrowUp' || key === 'Up' || key === 'w' || key === 'W') {
        keys.up = false;
        e.preventDefault();
      } else if (key === 'ArrowDown' || key === 'Down' || key === 's' || key === 'S') {
        keys.down = false;
        e.preventDefault();
      } else if (key === ' ') {
        keys.jump = false;
        e.preventDefault();
      } else if (key === 'p' || key === 'P' || key === 'Escape') {
        keys.pause = false;
        e.preventDefault();
      }
    });

    function addMobileListeners(btn, keyProp) {
      if (!btn) return;
      
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        initAudio();
        keys[keyProp] = true;
      });
      btn.addEventListener('pointerup', (e) => {
        e.preventDefault();
        keys[keyProp] = false;
      });
      btn.addEventListener('pointerleave', (e) => {
        e.preventDefault();
        keys[keyProp] = false;
      });
      btn.addEventListener('pointercancel', (e) => {
        e.preventDefault();
        keys[keyProp] = false;
      });
      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        keys[keyProp] = false;
      });
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        initAudio();
        keys[keyProp] = true;
      });
    }

    // ═══════════════════════════════════════════════════════════════
    // 📊 حالة اللعبة
    // ═══════════════════════════════════════════════════════════════
    const STATE = {

    // ═══════════════════════════════════════════════════════════════
    // 🧍 نظام اللاعب
    // ═══════════════════════════════════════════════════════════════
    const PLAYER_WIDTH = 120;

    const MOVE_ACC = 3500;

    let player = {

    let snowParticles = [];
    function initSnow() {
      const snowCount = window.innerWidth <= 600 ? 15 : 50;
      for(let i=0; i<snowCount; i++) {

        });

    }

    let particles = [];
    let items = [];
    let shakeAmount = 0;
    let score = 0;

    let midAirBonusText = '';


    function resetPlayer() {
      player.x = W / 2 - PLAYER_WIDTH / 2;
      player.y = H * 0.85;
      player.vx = 0;

      player.onGround = false;

    // ═══════════════════════════════════════════════════════════════
    // ✨ نظام الجسيمات (Particles)
    // ═══════════════════════════════════════════════════════════════
    function createParticle(x, y, color, type = 'dust') {
      const p = {
        x, y,
        vx: (Math.random() - 0.5) * 150,
        vy: (Math.random() - 0.5) * 150,
        life: 1.0,
        size: Math.random() * 5 + 2,
        color: color,
        type: type
      };
      if (type === 'sparkle') {
        p.vx *= 2;
        p.vy *= 2;
        p.size *= 1.5;
      }
      particles.push(p);
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt * 2;
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }

    function drawParticles() {
      for (let p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y - cameraY, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1.0;
    }

    // ═══════════════════════════════════════════════════════════════
    // 💎 نظام العناصر (Items)
    // ═══════════════════════════════════════════════════════════════
    const ITEM_TYPES = {
      GEM: { color: '#00f2ff', points: 50, symbol: '💎' },
      GOLD: { color: '#ffd700', points: 100, symbol: '⭐' },
      MAGNET: { color: '#ff4b4b', points: 20, symbol: '🧲' },
      ROCKET: { color: '#ff8c00', points: 30, symbol: '🚀' }
    };



    function createItem(x, y, type = 'GEM') {
      return {
        x, y,
        type: ITEM_TYPES[type],
        floatOffset: Math.random() * Math.PI * 2,
        collected: false,
        id: Math.random()
      };
    }

    function drawItems() {
      for (let item of items) {
        if (item.collected) continue;
        const screenY = item.y - cameraY + Math.sin(Date.now() * 0.005 + item.floatOffset) * 10;
        
        ctx.save();
        ctx.translate(item.x, screenY);
        ctx.rotate(Date.now() * 0.002);
        
        // رسم جوهرة
        ctx.fillStyle = item.type.color;
        ctx.beginPath();
        ctx.moveTo(0, -12);
        ctx.lineTo(10, 0);
        ctx.lineTo(0, 12);
        ctx.lineTo(-10, 0);
        ctx.closePath();
        ctx.fill();
        
        ctx.fillStyle = 'white';
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.moveTo(0, -12);
        ctx.lineTo(5, -5);
        ctx.lineTo(0, 0);
        ctx.lineTo(-5, -5);
        ctx.closePath();
        ctx.fill();
        
        ctx.restore();
      }
    }


    // ═══════════════════════════════════════════════════════════════
    // 🧱 نظام المنصات
    // ═══════════════════════════════════════════════════════════════
    const PLATFORM_TYPES = {
      STATIC: 'static',
      MOVING: 'moving',
      NARROW: 'narrow',
      FRAGILE: 'fragile'
    };

    let platforms = [];
    let cameraY = 0;
    let maxHeightReached = 0;
    let comboCount = 0;
    let comboTimer = 0;
    const COMBO_TIMEOUT = 1.4;

    function createPlatform(x, y, type = PLATFORM_TYPES.STATIC, width = null) {
      let w = width || (type === PLATFORM_TYPES.NARROW ? 56 : 96);
      return {
        x: x,
        y: y,
        width: w,
        height: 16,
        type: type,
        moveDir: 0,
        moveSpeed: 0,
        moveRange: 0,
        originX: x,
        fragileTimer: 0,
        broken: false,
        id: Math.random(),
        previousX: x
      };
    }

    function generateInitialPlatforms() {
      platforms = [];
      
      const widePlatformWidth = W - 30;
      const widePlatformX = 15;
      const bottomY = H * 0.9;
      platforms.push(createPlatform(widePlatformX, bottomY, PLATFORM_TYPES.STATIC, widePlatformWidth));
      
      player.y = bottomY - PLAYER_HEIGHT;
      player.x = W / 2 - PLAYER_WIDTH / 2;
      player.onGround = true;
      player.currentPlatform = platforms[0];
      
      let lastY = bottomY;
      const numPlatforms = Math.ceil(H / 70) + 5;
      
      for (let i = 0; i < numPlatforms; i++) {
        const distance = 65 + Math.random() * 30;
        const y = lastY - distance;
        const margin = 30;
        const x = margin + Math.random() * (W - margin * 2 - 100);
        
        let typeRand = Math.random();
        let type = PLATFORM_TYPES.STATIC;
        if (typeRand < 0.55) type = PLATFORM_TYPES.STATIC;
        else if (typeRand < 0.78) type = PLATFORM_TYPES.MOVING;
        else if (typeRand < 0.93) type = PLATFORM_TYPES.NARROW;
        else type = PLATFORM_TYPES.FRAGILE;

        const plat = createPlatform(x, y, type);
        
        if (type === PLATFORM_TYPES.MOVING) {
          plat.moveSpeed = 60 + Math.random() * 70;
          plat.moveDir = Math.random() > 0.5 ? 1 : -1;
          plat.moveRange = 40 + Math.random() * 50;
          plat.originX = x;
        }
        platforms.push(plat);
        
        // إضافة فرصة لظهور عنصر فوق المنصة
        if (i > 2 && Math.random() < 0.3) {
          items.push(createItem(x + plat.width/2, y - 40 - Math.random() * 60));
        }
        
        lastY = y;
      }
    }


    function addRandomPlatformAbove(baseY) {
      const diffRatio = Math.min(1, maxHeightReached / 300);
      const extraDist = diffRatio * 35;
      const minY = baseY - (95 + extraDist);
      const maxY = baseY - (65 + extraDist);
      const y = minY + Math.random() * (maxY - minY);
      
      const minWidth = 45;
      const maxWidthBase = Math.max(70, W * 0.35);
      const maxWidth = Math.max(minWidth + 10, maxWidthBase * (1 - diffRatio * 0.5));
      let platformWidth = minWidth + Math.random() * (maxWidth - minWidth);
      platformWidth = Math.min(platformWidth, W - 40);
      
      const margin = Math.max(20, (W - platformWidth) / 2);
      const x = margin + Math.random() * ((W - platformWidth) - margin * 2);
      
      let typeRand = Math.random();
      let type = PLATFORM_TYPES.STATIC;
      const staticProb = 0.5 - (diffRatio * 0.35);
      const movingProb = 0.25 + (diffRatio * 0.15);
      const narrowProb = 0.17 + (diffRatio * 0.08);
      
      if (typeRand < staticProb) type = PLATFORM_TYPES.STATIC;
      else if (typeRand < staticProb + movingProb) type = PLATFORM_TYPES.MOVING;
      else if (typeRand < staticProb + movingProb + narrowProb) type = PLATFORM_TYPES.NARROW;
      else type = PLATFORM_TYPES.FRAGILE;

      const plat = createPlatform(x, y, type, platformWidth);
      
      if (type === PLATFORM_TYPES.MOVING) {
        const baseSpeed = 70 + (diffRatio * 100);
        plat.moveSpeed = baseSpeed + Math.random() * (90 + diffRatio * 60);
        plat.moveDir = Math.random() > 0.5 ? 1 : -1;
        plat.moveRange = 40 + Math.random() * 60;
        plat.originX = x;
      }
      platforms.push(plat);
      
      // فرصة لظهور عنصر
      if (Math.random() < 0.4) {
        let rand = Math.random();
        let itemType = 'GEM';
        if (rand < 0.04) itemType = 'ROCKET';
        else if (rand < 0.1) itemType = 'MAGNET';
        else if (rand < 0.3) itemType = 'GOLD';

        
        items.push(createItem(x + plat.width/2, y - 50 - Math.random() * 80, itemType));
      }

    }


    function updatePlatforms(dt) {
      for (let plat of platforms) {
        if (plat.broken) continue;
        plat.previousX = plat.x;
        
        if (plat.type === PLATFORM_TYPES.MOVING) {
          plat.x += plat.moveDir * plat.moveSpeed * dt;
          if (plat.x > plat.originX + plat.moveRange) {
            plat.x = plat.originX + plat.moveRange;
            plat.moveDir = -1;
          } else if (plat.x < plat.originX - plat.moveRange) {
            plat.x = plat.originX - plat.moveRange;
            plat.moveDir = 1;
          }
          plat.x = Math.max(0, Math.min(plat.x, W - plat.width));
          
          if (player.onGround && player.currentPlatform && player.currentPlatform.id === plat.id) {
            player.x += (plat.x - plat.previousX);
          }
        }
        
        if (plat.type === PLATFORM_TYPES.FRAGILE && plat.fragileTimer > 0) {
          plat.fragileTimer -= dt;
          if (plat.fragileTimer <= 0) plat.broken = true;
        }
      }
      
      platforms = platforms.filter(p => p.y - cameraY < H + 200 && !p.broken);
      items = items.filter(it => it.y - cameraY < H + 200 && !it.collected);

      
      while (platforms.length < Math.ceil(H / 60) + 8) {
        const highestY = platforms.reduce((min, p) => Math.min(min, p.y), platforms[0]?.y || 0);
        addRandomPlatformAbove(highestY - 50);
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // 💥 نظام التصادم
    // ═══════════════════════════════════════════════════════════════
    function handleCollisions() {
      player.onGround = false;
      player.currentPlatform = null;
      
      for (let plat of platforms) {
        if (plat.broken) continue;
        
        const playerBottom = player.y + player.height;
        const playerPrevBottom = playerBottom - player.vy * 0.016;
        
        if (player.vy >= 0 &&
            player.x + player.width > plat.x + 5 &&
            player.x < plat.x + plat.width - 5 &&
            playerBottom >= plat.y &&
            playerPrevBottom <= plat.y + 10) {
          
          player.y = plat.y - player.height;
          player.vy = 0;
          player.onGround = true;
          player.currentPlatform = plat;
          player.canDoubleJump = true;

          
          if (plat.type === PLATFORM_TYPES.FRAGILE && plat.fragileTimer === 0) {
            const diffRatio = Math.min(1, maxHeightReached / 300);
            plat.fragileTimer = 0.35 - (diffRatio * 0.2); // يكسر أسرع مع الصعوبة
            sfxLand();
          }
          
          // جسيمات الهبوط
          if (!player.onGround && player.vy > 100) {
            for(let i=0; i<6; i++) createParticle(player.x + player.width/2, player.y + player.height, '#ffffff', 'dust');
          }

          
          if (player.lastPlatform !== plat.id) {
            player.lastPlatform = plat.id;
            if (comboTimer > 0) {
              comboCount++;
              sfxCombo();
            } else {
              comboCount = 1;
            }
            comboTimer = COMBO_TIMEOUT;
            if (comboCount === 1) sfxLand();
          }
          break;
        }
      }
      
      // تصادم مع العناصر
      for (let it of items) {
        if (it.collected) continue;
        
        // تأثير المغناطيس
        if (player.magnetTimer > 0) {
          const mdx = (player.x + player.width/2) - it.x;
          const mdy = (player.y + player.height/2) - it.y;
          const mdist = Math.sqrt(mdx*mdx + mdy*mdy);
          if (mdist < 300) {
            it.x += mdx * 0.15;
            it.y += mdy * 0.15;
          }
        }

        const dx = (player.x + player.width/2) - it.x;

        const dy = (player.y + player.height/2) - it.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist < 60) {
          it.collected = true;
          let bonus = it.type.points;
          let text = `+${bonus}`;
          
          if (!player.onGround) {
            bonus *= 2;
            text = `MID-AIR BONUS! +${bonus}`;
            midAirBonusTimer = 1.5;
            midAirBonusText = "MID-AIR BONUS!";
            shakeAmount = 10;
            // انفجار جسيمات عند الجمع في الهواء
            for(let i=0; i<15; i++) createParticle(it.x, it.y, it.type.color, 'sparkle');
          } else {
            for(let i=0; i<8; i++) createParticle(it.x, it.y, it.type.color, 'dust');
          }
          
          if (it.type.symbol === '🧲') {
            player.magnetTimer = 8;
            midAirBonusText = "MAGNET ACTIVE!";
            midAirBonusTimer = 2;
          } else if (it.type.symbol === '🚀') {
            player.rocketTimer = 2.5;
            midAirBonusText = "ROCKET BOOST!";
            midAirBonusTimer = 2;
            sfxJump();
          }

          
          score += bonus;

          playSound(800 + Math.random() * 400, 'sine', 0.1, 0.1);
        }
      }
    }


    // ═══════════════════════════════════════════════════════════════
    // 🎬 نظام الأنيميشن
    // ═══════════════════════════════════════════════════════════════
    function getCurrentPlayerImage() {
      if (!player.onGround) {
        // في الهواء
        if (player.vy < -50) {
          return playerImages.jump || playerImages.fall || playerImages.idle;
        } else if (player.vy > 200) {
          return playerImages.fall || playerImages.jump || playerImages.idle;
        } else {
          return playerImages.jump || playerImages.idle;
        }
      } else if (player.isMoving) {
        return currentWalkFrame === 1 ? 
          (playerImages.walk1 || playerImages.idle) : 
          (playerImages.walk2 || playerImages.idle);
      } else {
        return playerImages.idle;
      }
    }

    function updatePlayerAnimation(dt) {
      if (!player.onGround) {
        player.currentImage = 'jump';
        player.isMoving = false;
      } else if (player.isMoving) {
        walkFrameTimer += dt;
        if (walkFrameTimer >= WALK_FRAME_DURATION) {
          walkFrameTimer = 0;
          currentWalkFrame = currentWalkFrame === 1 ? 2 : 1;
        }
        player.currentImage = currentWalkFrame === 1 ? 'walk1' : 'walk2';
      } else {
        player.currentImage = 'idle';
        walkFrameTimer = 0;
        currentWalkFrame = 1;
      }
    }

    function updatePlayer(dt) {
      let moveDir = 0;
      if (keys.left) moveDir -= 1;
      if (keys.right) moveDir += 1;
      
      if (moveDir !== 0) {
        player.vx += moveDir * MOVE_ACC * dt;
        if (Math.abs(player.vx) > MAX_SPEED) player.vx = Math.sign(player.vx) * MAX_SPEED;
        player.facingRight = moveDir > 0;
        player.isMoving = true;
      } else {
        if (Math.abs(player.vx) < INSTANT_STOP_THRESHOLD) {
          player.vx = 0;
          player.isMoving = false;
        } else {
          player.vx -= Math.sign(player.vx) * FRICTION * dt;
          player.isMoving = true;
        }
      }

      if ((keys.jump || keys.up) && player.onGround && gameState === STATE.PLAYING) {
        player.vy = -JUMP_FORCE;
        player.onGround = false;
        player.lastPlatform = null;
        player.currentPlatform = null;
        sfxJump();
        
        // جسيمات القفز
        for(let i=0; i<8; i++) createParticle(player.x + player.width/2, player.y + player.height, '#ffffff', 'dust');
        
        keys.jump = false;
        keys.up = false;
      } else if ((keys.jump || keys.up) && !player.onGround && player.canDoubleJump && gameState === STATE.PLAYING) {
        player.vy = -JUMP_FORCE * 0.85;
        player.canDoubleJump = false;
        sfxJump();
        shakeAmount = 8;
        for(let i=0; i<15; i++) createParticle(player.x + player.width/2, player.y + player.height/2, '#00f2ff', 'sparkle');
        keys.jump = false;
        keys.up = false;
      }

      
      if (keys.jumpSmall && player.onGround && gameState === STATE.PLAYING) {
        player.vy = -JUMP_SMALL_FORCE;
        player.onGround = false;
        player.lastPlatform = null;
        player.currentPlatform = null;
        sfxJump();
        keys.jumpSmall = false;
      }
      
      if (keys.down && !player.onGround) {
        player.vy += DOWN_SPEED * 2;
      }

      player.vy += GRAVITY * dt;
      player.x += player.vx * dt;
      player.y += player.vy * dt;

      if (player.x < 0) {
        player.x = 0;
        player.vx *= -0.3;
      } else if (player.x + player.width > W) {
        player.x = W - player.width;
        player.vx *= -0.3;
      }

      if (comboTimer > 0) {
        comboTimer -= dt;
        if (comboTimer <= 0) comboCount = 0;
      }
      
      updatePlayerAnimation(dt);
      
      // منطق الصاروخ
      if (player.rocketTimer > 0) {
        player.rocketTimer -= dt;
        player.vy = -1200; // دفع قوي للأعلى
        player.onGround = false;
        shakeAmount = 10;
        // جسيمات النار
        for(let i=0; i<5; i++) {
          createParticle(player.x + player.width/2 + (Math.random()-0.5)*40, player.y + player.height, '#ff4400', 'sparkle');
          createParticle(player.x + player.width/2 + (Math.random()-0.5)*40, player.y + player.height, '#ffaa00', 'dust');
        }
      }

      // تحديث الأثر (Trail)

      const maxTrails = window.innerWidth <= 600 ? 3 : 8;
      if (!player.onGround || Math.abs(player.vx) > 300) {
        player.trail.push({ x: player.x, y: player.y, alpha: 0.5, image: getCurrentPlayerImage(), facingRight: player.facingRight });
        if (player.trail.length > maxTrails) player.trail.shift();
      } else {
        if (player.trail.length > 0) player.trail.shift();
      }
      
      for (let t of player.trail) t.alpha -= dt * 3;
      
      if (shakeAmount > 0) {

        shakeAmount -= dt * 40;
        if (shakeAmount < 0) shakeAmount = 0;
      }
      
      if (midAirBonusTimer > 0) {
        midAirBonusTimer -= dt;
      }
      
      if (player.magnetTimer > 0) {
        player.magnetTimer -= dt;
        if (Math.random() < 0.3) createParticle(player.x + player.width/2, player.y + player.height/2, '#ff4b4b', 'sparkle');
      }
      
      // تحديث الثلج
      for(let s of snowParticles) {
        s.y += s.speed * dt;
        s.x += Math.sin(Date.now() * 0.001) * 0.5;
        if (s.y > H) {
          s.y = -20;
          s.x = Math.random() * W;
        }
      }
      
      updateParticles(dt);

    }


    function updateCamera() {
      const targetScreenY = H * 0.5;
      const playerScreenY = player.y - cameraY;
      if (playerScreenY < targetScreenY) {
        cameraY += (playerScreenY - targetScreenY) * 0.12;
      }
      
      const currentHeight = Math.floor(Math.max(0, (H * 0.9 - player.y)) / 10);
      if (currentHeight > maxHeightReached) {
        maxHeightReached = currentHeight;
        
        // احتفال بكسر الرقم القياسي
        if (maxHeightReached > highScore && highScore > 0 && !this.celebratedHighScore) {
          this.celebratedHighScore = true;
          midAirBonusText = "NEW RECORD!";
          midAirBonusTimer = 3;
          shakeAmount = 15;
          for(let i=0; i<30; i++) createParticle(player.x + player.width/2, player.y + player.height/2, '#ffd700', 'sparkle');
          playSound(1000, 'sine', 0.5, 0.1);
        }
      }
    }


    function checkGameOver() {
      if (player.y - cameraY > H + 80) {
        gameOver();
      }
    }

    function gameOver() {
      if (gameState !== STATE.PLAYING) return;
      gameState = STATE.GAMEOVER;
      startBtn.textContent = 'إعادة اللعب';
      startOverlay.classList.remove('hidden');
      sfxGameOver();
      const finalHeight = Math.floor(maxHeightReached);
      if (finalHeight > highScore) {
        highScore = finalHeight;
        try { localStorage.setItem('icyTowerHighScore', highScore); } catch(e) {}
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // 🎨 نظام الرسم
    // ═══════════════════════════════════════════════════════════════
    function drawBackground() {
      const heightFactor = Math.min(1, maxHeightReached / 1000);
      
      const gradient = ctx.createLinearGradient(0, 0, 0, H);
      
      // تغيير الألوان حسب الارتفاع
      let colorTop = '#0a1628';
      let colorMid = '#152238';
      let colorBot = '#1a3350';
      
      if (heightFactor > 0.3) {
        colorTop = '#050a1a'; // أغمق
        colorMid = '#0c152a';
      }
      if (heightFactor > 0.6) {
        colorTop = '#02040d'; // شبه فضائي
        colorMid = '#050a1a';
      }
      
      gradient.addColorStop(0, colorTop);
      gradient.addColorStop(0.5, colorMid);
      gradient.addColorStop(1, colorBot);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);
      
      // رسم الثلج
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      for(let s of snowParticles) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
        ctx.fill();
      }

      ctx.strokeStyle = '#2a4060';

      ctx.lineWidth = 2;
      for (let i = 0; i < W; i += 60) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i - 30, H);
        ctx.strokeStyle = '#253a52';
        ctx.stroke();
      }
      
      const groundGradient = ctx.createLinearGradient(0, H - 20, 0, H);
      groundGradient.addColorStop(0, '#c8e0f4');
      groundGradient.addColorStop(1, '#ffffff');
      ctx.fillStyle = groundGradient;
      ctx.fillRect(0, H - 20, W, 20);
    }

    function drawPlatforms() {
      for (let plat of platforms) {
        if (plat.broken) continue;
        const screenY = plat.y - cameraY;
        if (screenY < -30 || screenY > H + 30) continue;
        
        let color = '#6b9ec2';
        if (plat.width > W * 0.5) color = '#3a7ca5';
        if (plat.type === PLATFORM_TYPES.MOVING) color = '#c9a243';
        else if (plat.type === PLATFORM_TYPES.NARROW) color = '#b5735c';
        else if (plat.type === PLATFORM_TYPES.FRAGILE) {
          color = plat.fragileTimer > 0 ? '#d96c6c' : '#a75c5c';
        }
        
        ctx.fillStyle = '#00000060';
        ctx.fillRect(plat.x, screenY + 4, plat.width, plat.height);
        
        ctx.fillStyle = color;
        ctx.fillRect(plat.x, screenY, plat.width, plat.height);
        ctx.fillStyle = '#ffffff50';
        ctx.fillRect(plat.x, screenY, plat.width, 4);
      }
    }

    function drawPlayer() {
      const screenY = player.y - cameraY;
      const currentSprite = getCurrentPlayerImage();
      
      if (!currentSprite) return;
      
      ctx.save();
      
      // ظل تحت اللاعب
      if (player.onGround) {
        ctx.fillStyle = '#00000040';
        ctx.beginPath();
        ctx.ellipse(player.x + player.width/2, screenY + player.height, player.width/3, 4, 0, 0, Math.PI*2);
        ctx.fill();
      }
      
      // تأثير المغناطيس حول اللاعب
      if (player.magnetTimer > 0) {
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255, 75, 75, ' + (0.3 + Math.sin(Date.now() * 0.01) * 0.2) + ')';
        ctx.lineWidth = 3;
        ctx.arc(player.x + player.width/2, screenY + player.height/2, 80, 0, Math.PI*2);
        ctx.stroke();
      }

      // رسم الأثر (Trail)

      for (let t of player.trail) {
        if (t.alpha <= 0) continue;
        ctx.save();
        ctx.globalAlpha = t.alpha;
        const ty = t.y - cameraY;
        if (!t.facingRight) {
          ctx.translate(t.x + player.width, ty);
          ctx.scale(-1, 1);
          ctx.drawImage(t.image, 0, 0, player.width, player.height);
        } else {
          ctx.drawImage(t.image, t.x, ty, player.width, player.height);
        }
        ctx.restore();
      }
      
      // عكس الصورة إذا كان يتجه لليسار
      if (!player.facingRight) {
        ctx.translate(player.x + player.width, screenY);
        ctx.scale(-1, 1);
        ctx.drawImage(currentSprite, 0, 0, player.width, player.height);
      } else {
        ctx.drawImage(currentSprite, player.x, screenY, player.width, player.height);
      }
      
      ctx.restore();
    }


    function drawUIOverlay() {
      const displayScore = Math.floor(maxHeightReached * 10 + score);
      heightDisplay.textContent = `${displayScore} نقطة`;
      
      // عداد الكومبو
      if (comboCount > 1) {
        comboDisplay.textContent = `x${comboCount}`;
        const comboWidth = (comboTimer / COMBO_TIMEOUT) * 100;
        ctx.save();
        ctx.fillStyle = '#ffd966';
        ctx.fillRect(W/2 - 50, 80, comboWidth, 6);
        ctx.restore();
      } else {
        comboDisplay.textContent = '';
      }


      
      if (midAirBonusTimer > 0) {
        ctx.save();
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 24px "Segoe UI"';
        ctx.textAlign = 'center';
        ctx.globalAlpha = Math.min(1.0, midAirBonusTimer * 2);
        
        ctx.fillStyle = '#000000';
        ctx.fillText(midAirBonusText, W/2 + 2, H * 0.2 + 2);
        
        ctx.fillStyle = '#ffd700';
        ctx.fillText(midAirBonusText, W/2, H * 0.2);
        ctx.restore();
      }
    }


    function drawMenuOverlay() {
      ctx.fillStyle = '#000000c0';
      ctx.fillRect(0, 0, W, H);
      const titleY = H * 0.3 + Math.sin(Date.now() * 0.002) * 10;
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${Math.min(W * 0.08, 36)}px "Segoe UI"`;
      ctx.textAlign = 'center';
      ctx.fillText('❄️ AL-OMDA MAN ❄️', W/2, titleY);
      ctx.fillStyle = '#c8e0ff';
      ctx.font = `${Math.min(W * 0.04, 18)}px "Segoe UI"`;
      ctx.fillText('الرجل العمدة', W/2, titleY + 50);


      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${Math.min(W * 0.045, 20)}px "Segoe UI"`;
      ctx.fillText(`🏆 أعلى نتيجة: ${highScore} م`, W/2, H * 0.55);
    }

    function drawPauseOverlay() {
      ctx.fillStyle = '#000000cc';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = 'white';
      ctx.font = `bold ${Math.min(W * 0.07, 30)}px "Segoe UI"`;
      ctx.textAlign = 'center';
      ctx.fillText('⏸ إيقاف مؤقت', W/2, H/2);
    }

    function drawGameOverOverlay() {
      ctx.fillStyle = '#0a0a1ae0';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ffaaaa';
      ctx.font = `bold ${Math.min(W * 0.08, 34)}px "Segoe UI"`;
      ctx.textAlign = 'center';
      ctx.fillText('انتهت اللعبة', W/2, H*0.3);
      ctx.fillStyle = 'white';
      ctx.font = `${Math.min(W * 0.045, 20)}px "Segoe UI"`;
      ctx.fillText(`📊 الارتفاع: ${Math.floor(maxHeightReached)} م`, W/2, H*0.45);
      ctx.fillText(`🏆 الأفضل: ${highScore} م`, W/2, H*0.53);
    }

    function render() {
      ctx.save();
      
      // تطبيق اهتزاز الشاشة
      if (shakeAmount > 0) {
        const sx = (Math.random() - 0.5) * shakeAmount;
        const sy = (Math.random() - 0.5) * shakeAmount;
        ctx.translate(sx, sy);
      }
      
      ctx.scale(currentZoom * DPR, currentZoom * DPR);
      ctx.imageSmoothingEnabled = true;

      if (window.innerWidth > 600) {
        ctx.imageSmoothingQuality = 'high';
      }

      drawBackground();
      
      // رسم خط الرقم القياسي
      if (highScore > 0) {
        const hsY = (H * 0.9) - (highScore * 10);
        const hsScreenY = hsY - cameraY;
        if (hsScreenY > -50 && hsScreenY < H + 50) {
          ctx.setLineDash([10, 10]);
          ctx.strokeStyle = 'rgba(255, 215, 0, 0.6)';
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(0, hsScreenY);
          ctx.lineTo(W, hsScreenY);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = '#ffd700';
          ctx.font = 'bold 16px "Segoe UI"';
          ctx.fillText(`🏆 BEST: ${highScore}`, 10, hsScreenY - 10);
        }
      }

      drawPlatforms();

      drawItems();
      drawPlayer();
      drawParticles();
      drawUIOverlay();

      
      if (gameState === STATE.MENU) drawMenuOverlay();
      else if (gameState === STATE.PAUSED) drawPauseOverlay();
      else if (gameState === STATE.GAMEOVER) drawGameOverOverlay();
      
      ctx.restore();
    }

    // ═══════════════════════════════════════════════════════════════
    // 🔄 حلقة اللعبة
    // ═══════════════════════════════════════════════════════════════
    let lastTime = performance.now();
    let pauseCooldown = false;

    function gameLoop(now) {
      requestAnimationFrame(gameLoop);
      let dt = (now - lastTime) / 1000;
      if (dt > 0.15) dt = 0.15;
      lastTime = now;

      if (keys.pause && !pauseCooldown) {
        pauseCooldown = true;
        if (gameState === STATE.PLAYING) {
          gameState = STATE.PAUSED;
          sfxClick();
        } else if (gameState === STATE.PAUSED) {
          gameState = STATE.PLAYING;
          sfxClick();
        }
      }
      if (!keys.pause) pauseCooldown = false;

      if (gameState === STATE.MENU) {
        if (keys.jump || keys.up) {
          initAudio();
          startGame();
          keys.jump = false;
          keys.up = false;
        }
      } else if (gameState === STATE.PLAYING) {
        updatePlayer(dt);
        handleCollisions();
        updatePlatforms(dt);
        updateCamera();
        checkGameOver();
      } else if (gameState === STATE.GAMEOVER) {
        if (keys.jump || keys.up) {
          restartGame();
          keys.jump = false;
          keys.up = false;
        }
      }

      render();
    }

    function startGame() {
      gameState = STATE.PLAYING;
      startOverlay.classList.add('hidden');
      resetPlayer();
      platforms = [];
      generateInitialPlatforms();
      cameraY = 0;
      maxHeightReached = 0;
      this.celebratedHighScore = false;
      comboCount = 0;

      comboTimer = 0;
      keys.jump = false;
      keys.up = false;
      keys.jumpSmall = false;
    }

    function restartGame() {
      startGame();
    }

    // بدء اللعبة
    resetPlayer();
    generateInitialPlatforms();
    cameraY = 0;
    requestAnimationFrame(gameLoop);
    
    window.addEventListener('resize', () => {
      if (gameState === STATE.MENU || gameState === STATE.GAMEOVER) {
        platforms = [];
        generateInitialPlatforms();
        cameraY = 0;
      }
    });
  })();
</script>
