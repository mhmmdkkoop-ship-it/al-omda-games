<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AL_OMDA GAMES</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #050810;
      background-image: radial-gradient(circle at 50% 50%, #1a243a 0%, #050810 100%);
      position: fixed;
      top: 0; bottom: 0; left: 0; right: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      touch-action: manipulation;
    }
    /* Game Selection Hub Styles */
    #hub-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #1a2a4a 0%, #0a0f1e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 40px;
      overflow-y: auto;
    }
    .hub-title {
      color: #ffffff;
      font-size: 3.5rem;
      font-weight: 900;
      margin-bottom: 50px;
      text-shadow: 0 0 20px rgba(91, 155, 213, 0.6);
      text-align: center;
      letter-spacing: 4px;
      font-family: 'Segoe UI', sans-serif;
    }
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      width: 100%;
      max-width: 1000px;
    }
    .game-card {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
      text-decoration: none;
    }
    .game-card::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: conic-gradient(transparent, rgba(91, 155, 213, 0.3), transparent 30%);
      animation: rotateBorder 4s linear infinite;
      z-index: -1;
    }
    @keyframes rotateBorder {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .game-card:hover {
      transform: translateY(-15px) scale(1.05);
      border-color: #5b9bd5;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(91, 155, 213, 0.4);
    }
    .game-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
    }
    .game-name {
      color: white;
      font-size: 1.8rem;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .game-desc {
      color: #a0b0c0;
      font-size: 1rem;
      line-height: 1.4;
    }
    .coming-soon {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .coming-soon:hover { transform: none; box-shadow: none; border-color: rgba(255,255,255,0.1); }
    @media (max-width: 600px) {
      .game-card {
        backdrop-filter: none;
        background: rgba(255, 255, 255, 0.1);
      }
    }
  </style>
</head>
<body>
  <div id="hub-layer">
    <h1 class="hub-title">AL_OMDA GAMES</h1>
    <div class="game-grid">
      <a href="al_omda_man/index.html" class="game-card" id="btnLaunchOmda">
        <div class="game-icon">❄️</div>
        <div class="game-name">AL-OMDA MAN</div>
        <div class="game-desc"></div>
      </a>
      <div class="game-card coming-soon">
        <div class="game-icon">🚗</div>
        <div class="game-name">قريباً...</div>
        <div class="game-desc">لعبة سباق سيارات مثيرة قادمة في التحديث القادم.</div>
      </div>
    </div>
  </div>
</body>
</html>
